<!DOCTYPE html>
<html>
<head>
    <style>
        /* Design yoroheje cyane ya button */
        .submit-btn {
            background-color: #000; /* Umukara */
            color: white;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
        }

        /* Gushyira imyanya hagati y'imirongo */
        .form-group {
            margin-bottom: 15px;
        }
        
        input {
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="form-group">
        First name: <input type="text" name="first_name"/>
    </div>

    <div class="form-group">
        Last name: <input type="text" name="last_name"/>
    </div>

    <div class="form-group">
        Email: <input type="email" name="email"/>
    </div>

    <div class="form-group">
        Password: <input type="password" name="password"/>
    </div>

    <button class="submit-btn">Submit</button>
    
    <br><br>
    <a href="ade.html">Back</a>

</body>
</html>
